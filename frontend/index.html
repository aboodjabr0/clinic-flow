<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClinicFlow</title>
    <script>
      // Resolve and apply the theme before first paint to avoid a flash.
      // Priority: saved choice -> system preference -> light.
      (function () {
        try {
          var saved = localStorage.getItem("clinicflow.theme");
          var theme =
            saved === "light" || saved === "dark"
              ? saved
              : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
      // Resolve and apply the language/direction before first paint to avoid a flash.
      // Priority: saved choice -> English default.
      (function () {
        try {
          var savedLanguage = localStorage.getItem("clinicflow.language");
          var language = savedLanguage === "ar" ? "ar" : "en";
          document.documentElement.lang = language;
          document.documentElement.dir = language === "ar" ? "rtl" : "ltr";
        } catch (e) {
          document.documentElement.lang = "en";
          document.documentElement.dir = "ltr";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
